</html><style>*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
}

body{
  background:#ffffff;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  height:100vh;
  overflow:hidden; /* scroll only middle */
}

/* Header */
.header-section{
  padding:16px 16px 12px 16px;
  background:#ffffff;
  display:flex;
  align-items:center;
  gap:12px;
  flex-wrap:wrap;
  border-bottom:1px solid #eef2f6;
}

.brand-container{
  display:flex;
  align-items:center;
  gap:8px;
  padding:4px 8px 4px 4px;
  background:transparent;
  border:none;
}

.store-image img{
  width:42px;
  height:42px;
  object-fit:cover;
  border:none;
  border-radius:0;
  display:block;
}

/* Star Store animated text */
.store-name{
  font-size:1.6rem;
  font-weight:800;
  letter-spacing:1px;
  display:inline-block;
  background:linear-gradient(45deg, #1a4bc4, #3f7af0, #1a4bc4);
  background-size:200% auto;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  text-shadow:0 2px 10px rgba(29,78,211,0.3);
  animation:shine 3s linear infinite, fadeInOut 6s ease-in-out infinite;
}

@keyframes shine{
  0%{ background-position:0% center; }
  50%{ background-position:100% center; }
  100%{ background-position:0% center; }
}
@keyframes fadeInOut{
  0%{ opacity:0.7; transform:scale(0.98); }
  25%{ opacity:1; transform:scale(1); }
  50%{ opacity:1; transform:scale(1); }
  75%{ opacity:1; transform:scale(1); }
  90%{ opacity:0.7; transform:scale(0.98); }
  100%{ opacity:0.7; transform:scale(0.98); }
}

/* Search trigger */
.search-wrapper{
  flex:1;
  min-width:200px;
}

.search-container{
  display:flex;
  align-items:center;
  background:#f2f4f8;
  border-radius:40px;
  padding:8px 18px;
  border:1px solid #e0e7f0;
  transition:all .2s;
}

.search-container i{
  color:#1d4ed3;
  margin-right:8px;
}

.search-container input{
  flex:1;
  border:none;
  background:transparent;
  outline:none;
  font-size:0.95rem;
  padding:6px 0;
  color:#1a2634;
}

.search-container input::placeholder{
  color:#8a9bb8;
  font-style:italic;
}

/* Middle scroll area */
.content-area{
  flex:1;
  overflow-y:auto;
  padding:16px;
  background:#ffffff;
}

/* Home cards */
.hero-list{
  display:flex;
  flex-direction:column;
  gap:16px;
}

.hero-card{
  height:180px;
  border-radius:18px;
  overflow:hidden;
  position:relative;
  background-image:var(--bg);
  background-size:cover;
  background-position:center;
}

.hero-card::before{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(
    to bottom,
    transparent 40%,
    rgba(0,0,0,0.5) 100%
  );
}

.hero-overlay{
  position:absolute;
  left:10px;
  right:10px;
  bottom:10px;
  display:flex;
  align-items:center;
  gap:12px;
  background:rgba(255,255,255,0.25);
  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
  padding:8px;
  border-radius:12px;
}

.hero-app-icon{
  width:50px;
  height:50px;
  border-radius:12px;
  object-fit:cover;
}

.hero-app-name{
  flex:1;
  font-weight:900;
  color:#111;
  overflow:hidden;
  white-space:nowrap;
  text-overflow:ellipsis;
}

.hero-download{
  background:#2563eb;
  color:white;
  padding:8px 14px;
  border-radius:10px;
  font-weight:900;
  border:none;
}

/* Bottom Nav */
.bottom-nav{
  background:#ffffff;
  padding:12px 20px 20px 20px;
  border-top:1px solid #eef2f8;
}

.nav-buttons{
  display:flex;
  justify-content:space-around;
  align-items:center;
  max-width:450px;
  margin:0 auto;
  gap:10px;
}

.nav-btn{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  color:white;
  border:none;
  border-radius:40px;
  padding:10px 18px;
  min-width:90px;
  font-size:0.9rem;
  font-weight:700;
  gap:6px;
  background:linear-gradient(145deg, #1d4ed3, #2563eb);
  box-shadow:0 4px 15px rgba(29,78,211,0.4);
  position:relative;
  overflow:hidden;
  cursor:pointer;
  transition:.25s;
}

.nav-btn::after{
  content:'';
  position:absolute;
  top:-50%;
  left:-50%;
  width:200%;
  height:200%;
  background:radial-gradient(circle, rgba(255,255,255,0.3) 0%, transparent 70%);
  opacity:0;
  transform:scale(0.5);
  transition:.5s;
}

.nav-btn:hover::after{
  opacity:0.4;
  transform:scale(1);
}

.nav-btn:hover{
  transform:translateY(-2px);
}

.nav-btn i, .nav-btn span{
  position:relative;
  z-index:2;
  text-shadow:0 2px 4px rgba(0,0,0,0.2);
}

/* Search Screen */
.search-screen{
  position:fixed;
  inset:0;
  background:#ffffff;
  display:none;
  flex-direction:column;
  z-index:9999;
}
.search-screen.show{ display:flex; }

.search-topbar{
  padding:14px 14px 10px 14px;
  display:flex;
  align-items:center;
  gap:10px;
  border-bottom:1px solid #eef2f6;
}

.search-back{
  width:42px;
  height:42px;
  border:none;
  border-radius:12px;
  background:#f2f4f8;
  cursor:pointer;
}

.search-input-wrap{
  flex:1;
  display:flex;
  align-items:center;
  gap:8px;
  background:#f2f4f8;
  border:1px solid #e0e7f0;
  border-radius:16px;
  padding:10px 12px;
}

.search-input-wrap i{ color:#1d4ed3; }

.search-input-wrap input{
  flex:1;
  border:none;
  outline:none;
  background:transparent;
  font-size:1rem;
}

.search-clear{
  border:none;
  background:transparent;
  font-size:22px;
  line-height:1;
  cursor:pointer;
  color:#6b7a90;
}

.search-results{
  flex:1;
  overflow-y:auto;
  padding:14px;
}

.search-hint{
  color:#6b7a90;
  padding:8px 2px;
}

.result-item{
  display:flex;
  align-items:center;
  gap:12px;
  padding:12px;
  border:1px solid #e7edf6;
  border-radius:16px;
  margin-bottom:12px;
  background:#ffffff;
}

.result-icon{
  width:52px;
  height:52px;
  border-radius:14px;
  object-fit:cover;
  border:1px solid rgba(0,0,0,0.08);
}

.result-name{
  flex:1;
  font-weight:900;
  color:#101827;
}

.result-download{
  border:none;
  border-radius:12px;
  padding:10px 14px;
  cursor:pointer;
  color:#fff;
  font-weight:900;
  background:#2563eb;
}

.no-results{
  color:#6b7a90;
  padding:10px 2px;
}

/* Detail Screen (NEW UI) */
.detail-screen{
  position:fixed;
  inset:0;
  background:#ffffff;
  display:none;
  flex-direction:column;
  z-index:10000;
}
.detail-screen.show{ display:flex; }

.detail-cover{
  height:260px;
  background-size:cover;
  background-position:center;
  position:relative;
  border-bottom-left-radius:20px;
  border-bottom-right-radius:20px;
  overflow:hidden;
}
.detail-cover::after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(to bottom, rgba(0,0,0,0.15), rgba(0,0,0,0.70));
}

.detail-back{
  position:absolute;
  top:16px;
  left:16px;
  width:44px;
  height:44px;
  border:none;
  border-radius:12px;
  background:rgba(255,255,255,0.85);
  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
  z-index:3;
  cursor:pointer;
}

.detail-oncover{
  position:absolute;
  left:16px;
  right:16px;
  bottom:16px;
  display:flex;
  align-items:center;
  gap:12px;
  z-index:2;
}

.detail-icon{
  width:64px;
  height:64px;
  border-radius:16px;
  border:3px solid rgba(255,255,255,0.9);
  background:#fff;
  object-fit:cover;
  box-shadow:0 10px 24px rgba(0,0,0,0.25);
}

.detail-title{
  color:#ffffff;
  font-size:22px;
  font-weight:900;
  text-shadow:0 4px 14px rgba(0,0,0,0.45);
  overflow:hidden;
  white-space:nowrap;
  text-overflow:ellipsis;
}

.detail-body{
  flex:1;
  overflow-y:auto;
  padding:16px;
}

.detail-download{
  display:block;
  width:100%;
  background:#2563eb;
  color:#ffffff;
  text-align:center;
  padding:14px;
  border-radius:14px;
  font-weight:900;
  text-decoration:none;
  box-shadow:0 10px 22px rgba(37,99,235,0.25);
}

.detail-stats{
  display:flex;
  gap:10px;
  margin-top:12px;
}

.stat{
  flex:1;
  padding:12px;
  border-radius:12px;
  font-weight:900;
  display:flex;
  align-items:center;
  gap:8px;
}

.stat.blue{
  background:#eff6ff;
  color:#2563eb;
}

/* Other Apps (row aligned) */
.other-title{
  margin-top:18px;
  font-weight:900;
  color:#111827;
}

.other-list{
  margin-top:10px;

  gap:12px;

.other-item{

  gap:12px;

  border-radius:18px;
  border:1px solid #e7edf6;
  background:#ffffff;
}

.other-icon{
  width:56px;
  height:56px;
  border-radius:16px;
  object-fit:cover;
  border:1px solid rgba(0,0,0,0.08);
  background:#fff;
}

.other-name{
  flex:1;
  font-weight:900;
  color:#111827;
  font-size:1.05rem;
  overflow:hidden;
  white-space:nowrap;
  text-overflow:ellipsis;
}

.other-open{
  border:none;
  border-radius:14px;
  padding:10px 18px;
  cursor:pointer;
  color:#fff;
  font-weight:900;
  background:#2563eb;
  box-shadow:0 8px 18px rgba(37,99,235,0.18);
}

/* TOP Screen */
.top-screen{
  position:fixed;
  inset:0;
  background:#ffffff;
  display:none;
  flex-direction:column;
  z-index:10001;
}
.top-screen.show{ display:flex; }

.topbar{
  padding:14px;
  display:flex;
  align-items:center;
  gap:12px;
  border-bottom:1px solid #eef2f6;
}

.top-back{

  height:44px;
  border-radius:12px;

}

.top-title{

  font-size:1.15rem;
  color:#111827;
}

.top-list{
  flex:1;
  overflow-y:auto;
  padding:14px;
  display:flex;
  flex-direction:column;
  gap:14px;

  border:1px solid #e7edf6;

  position:relative;

/* Rank number (left side normal, not floating) */
.top-rank{
  position:static;
  width:36px;
  height:36px;
  border-radius:10px;
  display:flex;
  align-items:center;
  justify-content:center;

  color:#ffffff;
  background:#2563eb;

  height:50px;
  border-radius:12px;

.top-name{

  font-weight:900;
  font-size:1rem;
  color:#111827;
  overflow:hidden;

/* Download button */
.top-download{
  border:none;
  padding:8px 16px;
  border-radius:10px;
  font-weight:900;
  color:#ffffff;
  background:#2563eb;
  cursor:pointer;
  flex-shrink:0;
}



/* Modal open: stop background scroll */
body.modal-open{
  overflow:hidden !important;
}

/* Mobile */
@media (max-width:500px){
  .header-section{ flex-direction:column; align-items:stretch; }
  .store-name{ font-size:1.4rem; }
  .search-wrapper{ width:100%; }
  .nav-btn{ padding:10px 8px; min-width:70px; font-size:0.8rem; }
}

.like-btn {
  border: none;
  background: transparent;
  cursor: pointer;
}

.like-btn:active {
  transform: scale(0.95);
}

.like-btn:disabled {
  opacity: 0.6;
  cursor: not-allowed;
}</style><script>// script.js (မူရင်းအတိုင်း)

(function () {
  // ---------- Helpers ----------
  const qs = (s) => document.querySelector(s);
  const qsa = (s) => Array.from(document.querySelectorAll(s));

  function setModalOpen(isOpen) {
    document.body.classList.toggle("modal-open", isOpen);
  }

  function getAppsFromHome() {
    const cards = qsa(".hero-card");
    return cards.map((card, idx) => ({
      id: idx + 1,
      name: card.dataset.appName || card.querySelector(".hero-app-name")?.textContent?.trim() || `App ${idx + 1}`,
      icon: card.dataset.appIcon || card.querySelector(".hero-app-icon")?.getAttribute("src") || "",
      bg: card.dataset.appBg || "",
      download: card.dataset.appDownload || "#",
      likes: "0",
      downloads: "0",
    }));
  }

  // ---------- Elements ----------
  const homeBtn = qs("#homeBtn");
  const topBtn = qs("#topBtn");
  const myAppBtn = qs("#myAppBtn");

  // Search
  const openSearch = qs("#openSearch");
  const headerSearchInput = qs("#headerSearchInput");
  const searchScreen = qs("#searchScreen");
  const closeSearch = qs("#closeSearch");
  const searchInput = qs("#searchInput");
  const searchClear = qs("#searchClear");
  const searchResults = qs("#searchResults");

  // Detail
  const detailScreen = qs("#detailScreen");
  const detailBack = qs("#detailBack");
  const detailCover = qs("#detailCover");
  const detailIcon = qs("#detailIcon");
  const detailTitle = qs("#detailTitle");
  const detailDownload = qs("#detailDownload");
  const detailLikes = qs("#detailLikes");
  const detailDownloads = qs("#detailDownloads");
  const otherList = qs("#otherList");

  // TOP
  const topScreen = qs("#topScreen");
  const topBack = qs("#topBack");

  // ---------- Nav ----------
  if (homeBtn) homeBtn.addEventListener("click", () => qs(".content-area")?.scrollTo({ top: 0, behavior: "smooth" }));
  if (myAppBtn) myAppBtn.addEventListener("click", () => alert("My App စာမျက်နှာသို့ သွားမည်။"));

  // ---------- Search ----------
  function openSearchScreen() {
    searchScreen.classList.add("show");
    searchScreen.setAttribute("aria-hidden", "false");
    setModalOpen(true);
    if (searchInput) {
      searchInput.value = "";
      renderSearch("");
      setTimeout(() => searchInput.focus(), 0);
    }
  }

  function closeSearchScreen() {
    searchScreen.classList.remove("show");
    searchScreen.setAttribute("aria-hidden", "true");
    setModalOpen(false);
  }

  function renderSearch(query) {
    const q = (query || "").trim().toLowerCase();
    const apps = getAppsFromHome();

    searchResults.innerHTML = "";

    if (!q) {
      const hint = document.createElement("div");
      hint.className = "search-hint";
      hint.textContent = "ရှာချင်တဲ့ App နာမည် ရိုက်ပါ…";
      searchResults.appendChild(hint);
      return;
    }

    const matched = apps.filter(a => a.name.toLowerCase().includes(q));

    if (matched.length === 0) {
      const no = document.createElement("div");
      no.className = "no-results";
      no.textContent = "မတွေ့ပါ…";
      searchResults.appendChild(no);
      return;
    }

    matched.forEach(app => {
      const row = document.createElement("div");
      row.className = "result-item";

      const img = document.createElement("img");
      img.className = "result-icon";
      img.src = app.icon;
      img.alt = app.name;

      const name = document.createElement("div");
      name.className = "result-name";
      name.textContent = app.name;

      const btn = document.createElement("button");
      btn.className = "result-download";
      btn.type = "button";
      btn.textContent = "Download";
      btn.addEventListener("click", () => {
        closeSearchScreen();
        openDetail(app);
      });

      row.appendChild(img);
      row.appendChild(name);
      row.appendChild(btn);
      searchResults.appendChild(row);
    });
  }

  if (openSearch) openSearch.addEventListener("click", openSearchScreen);
  if (headerSearchInput) headerSearchInput.addEventListener("click", openSearchScreen);
  if (closeSearch) closeSearch.addEventListener("click", closeSearchScreen);

  if (searchClear) {
    searchClear.addEventListener("click", () => {
      if (!searchInput) return;
      searchInput.value = "";
      renderSearch("");
      searchInput.focus();
    });
  }

  if (searchInput) searchInput.addEventListener("input", (e) => renderSearch(e.target.value));

  // ---------- Detail ----------
  function openDetail(app) {
    // Set data
    detailCover.style.backgroundImage = `url('${app.bg || app.icon || ""}')`;
    detailIcon.src = app.icon || "";
    detailTitle.textContent = app.name || "App";
    detailDownload.href = app.download || "#";

    // Always 0 (blue)
    detailLikes.textContent = "0";
    detailDownloads.textContent = "0";

    // Render other apps (from Home list)
    const others = getAppsFromHome().filter(a => a.name !== app.name);
    otherList.innerHTML = "";

    others.forEach(a => {
      const item = document.createElement("div");
      item.className = "other-item";

      const icon = document.createElement("img");
      icon.className = "other-icon";
      icon.src = a.icon;
      icon.alt = a.name;

      const name = document.createElement("div");
      name.className = "other-name";
      name.textContent = a.name;

      const openBtn = document.createElement("button");
      openBtn.className = "other-open";
      openBtn.type = "button";
      openBtn.textContent = "Open";
      openBtn.addEventListener("click", () => openDetail(a));

      item.appendChild(icon);
      item.appendChild(name);
      item.appendChild(openBtn);

      otherList.appendChild(item);
    });

    // Show
    detailScreen.classList.add("show");
    detailScreen.setAttribute("aria-hidden", "false");
    setModalOpen(true);
  }

  function closeDetail() {
    detailScreen.classList.remove("show");
    detailScreen.setAttribute("aria-hidden", "true");
    setModalOpen(false);
  }

  if (detailBack) detailBack.addEventListener("click", closeDetail);

  // Home: Download click -> detail
  document.addEventListener("click", (e) => {
    const btn = e.target.closest(".hero-download");
    if (!btn) return;

    const card = btn.closest(".hero-card");
    if (!card) return;

    e.preventDefault();

    const app = {
      name: card.dataset.appName || "App",
      icon: card.dataset.appIcon || "",
      bg: card.dataset.appBg || "",
      download: card.dataset.appDownload || "#",
      likes: "0",
      downloads: "0",
    };

    openDetail(app);
  });

  // ---------- TOP ----------
  function openTopScreen() {
    topScreen.classList.add("show");
    topScreen.setAttribute("aria-hidden", "false");
    setModalOpen(true);
  }

  function closeTopScreen() {
    topScreen.classList.remove("show");
    topScreen.setAttribute("aria-hidden", "true");
    setModalOpen(false);
  }

  if (topBtn) topBtn.addEventListener("click", openTopScreen);
  if (topBack) topBack.addEventListener("click", closeTopScreen);

  // Top: Download click -> detail
  document.addEventListener("click", (e) => {
    const btn = e.target.closest(".top-download");
    if (!btn) return;

    const card = btn.closest(".top-card");
    if (!card) return;

    const app = {
      name: card.dataset.appName || "Top App",
      icon: card.dataset.appIcon || "",
      bg: card.dataset.appBg || "",
      download: card.dataset.appDownload || "#",
      likes: "0",
      downloads: "0",
    };

    closeTopScreen();
    openDetail(app);
  });

})();</script>
